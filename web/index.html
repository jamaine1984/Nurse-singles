  <style>
    #pwa-install-banner {
      align-items: center;
      background: rgba(3, 47, 51, 0.96);
      border: 1px solid rgba(94, 234, 212, 0.28);
      border-radius: 18px;
      bottom: max(12px, env(safe-area-inset-bottom));
      box-shadow: 0 18px 44px rgba(2, 6, 23, 0.28);
      box-sizing: border-box;
      color: #f8fafc;
      display: none;
      gap: 12px;
      left: 50%;
      max-width: min(560px, calc(100vw - 24px));
      padding: 12px 14px 12px 16px;
      position: fixed;
      transform: translateX(-50%);
      width: calc(100vw - 24px);
      z-index: 2147483647;
    }

    #pwa-install-banner.is-visible {
      display: flex;
    }

    #pwa-install-banner strong {
      display: block;
      font: 700 14px/1.25 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    #pwa-install-banner span {
      color: #cbd5e1;
      display: block;
      font: 500 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      margin-top: 2px;
    }

    #pwa-install-copy {
      flex: 1;
      min-width: 0;
    }

    #pwa-install-action {
      appearance: none;
      background: linear-gradient(135deg, #14b8a6, #0284c7);
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      cursor: pointer;
      flex: 0 0 auto;
      font: 800 13px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      min-height: 40px;
      padding: 0 16px;
    }

    #pwa-install-close {
      align-items: center;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border: 0;
      border-radius: 999px;
      color: #e2e8f0;
      cursor: pointer;
      display: inline-flex;
      flex: 0 0 34px;
      font: 700 20px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 34px;
      justify-content: center;
      width: 34px;
    }

    @media (max-width: 420px) {
      #pwa-install-banner {
        border-radius: 16px;
        gap: 10px;
        left: 12px;
        max-width: calc(100vw - 24px);
        padding: 10px;
        right: auto;
        transform: none;
        width: min(360px, calc(100vw - 24px));
      }

      #pwa-install-banner strong {
        font-size: 13px;
      }

      #pwa-install-banner span {
        font-size: 11px;
      }

      #pwa-install-action {
        box-sizing: border-box;
        min-height: 38px;
        min-width: 68px;
        padding: 0 10px;
      }

      #pwa-install-close {
        display: none;
      }
    }
  </style>
  <script>
    (function () {
      window.nurseSinglesAdConfig = {
        adsensePublisherId: '__ADSENSE_PUBLISHER_ID__',
        gamRewardedAdUnitPath: '__GAM_REWARDED_AD_UNIT_PATH__'
      };

      var config = window.nurseSinglesAdConfig;
      var publisherId = config.adsensePublisherId || '';
      var rewardedPath = config.gamRewardedAdUnitPath || '';

      if (/^ca-pub-\d+$/.test(publisherId)) {
        var adsenseScript = document.createElement('script');
        adsenseScript.async = true;
        adsenseScript.crossOrigin = 'anonymous';
        adsenseScript.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + encodeURIComponent(publisherId);
        document.head.appendChild(adsenseScript);
      }

      window.googletag = window.googletag || { cmd: [] };

      if (rewardedPath) {
        var gptScript = document.createElement('script');
        gptScript.async = true;
        gptScript.src = 'https://securepubads.g.doubleclick.net/tag/js/gpt.js';
        document.head.appendChild(gptScript);
      }

      window.nurseSinglesAds = {
        showRewardedAd: function (adUnitPath) {
          return new Promise(function (resolve) {
            var path = adUnitPath || rewardedPath;
            if (!path) {
              resolve({
                shown: false,
                granted: false,
                reason: 'Google Ad Manager rewarded inventory is not configured for web yet.'
              });
              return;
            }

            window.googletag = window.googletag || { cmd: [] };
            window.googletag.cmd.push(function () {
              var rewardedFormat = window.googletag.enums && window.googletag.enums.OutOfPageFormat
                ? window.googletag.enums.OutOfPageFormat.REWARDED
                : null;
              if (!rewardedFormat || !window.googletag.defineOutOfPageSlot) {
                resolve({
                  shown: false,
                  granted: false,
                  reason: 'Rewarded ads are not supported in this browser session.'
                });
                return;
              }

              var slot = window.googletag.defineOutOfPageSlot(path, rewardedFormat);
              if (!slot) {
                resolve({
                  shown: false,
                  granted: false,
                  reason: 'No rewarded web ad was available.'
                });
                return;
              }

              var granted = false;
              var rewardType = 'reward';
              var amount = 1;
              var completed = false;
              var pubads = window.googletag.pubads();

              function cleanup() {
                if (pubads.removeEventListener) {
                  pubads.removeEventListener('rewardedSlotReady', onReady);
                  pubads.removeEventListener('rewardedSlotGranted', onGranted);
                  pubads.removeEventListener('rewardedSlotClosed', onClosed);
                }
                if (window.googletag.destroySlots) {
                  window.googletag.destroySlots([slot]);
                }
              }

              function finish(reason) {
                if (completed) {
                  return;
                }
                completed = true;
                cleanup();
                resolve({
                  shown: true,
                  granted: granted,
                  rewardType: rewardType,
                  amount: amount,
                  reason: reason || ''
                });
              }

              function isCurrentSlot(event) {
                return !event.slot || event.slot === slot;
              }

              function onReady(event) {
                if (!isCurrentSlot(event)) {
                  return;
                }
                event.makeRewardedVisible();
              }

              function onGranted(event) {
                if (!isCurrentSlot(event)) {
                  return;
                }
                granted = true;
                if (event.payload) {
                  rewardType = event.payload.type || rewardType;
                  amount = Number(event.payload.amount || amount);
                }
              }

              function onClosed(event) {
                if (!isCurrentSlot(event)) {
                  return;
                }
                finish(granted ? '' : 'Rewarded ad was closed before the reward was granted.');
              }

              pubads.addEventListener('rewardedSlotReady', onReady);
              pubads.addEventListener('rewardedSlotGranted', onGranted);
              pubads.addEventListener('rewardedSlotClosed', onClosed);

              slot.addService(pubads);
              window.googletag.enableServices();
              window.googletag.display(slot);

              window.setTimeout(function () {
                finish('No rewarded web ad was available.');
              }, 15000);
            });
          });
        }
      };
    })();
  </script>

<body>
  <div id="pwa-install-banner" hidden>
    <div id="pwa-install-copy">
      <strong>Install app to phone</strong>
      <span id="pwa-install-detail">Open Nurse Singles like an app from your home screen.</span>
    </div>
    <button id="pwa-install-action" type="button">Install</button>
    <button id="pwa-install-close" type="button" aria-label="Dismiss install prompt">&times;</button>
  </div>
  <script>
    (function () {
      var banner = document.getElementById('pwa-install-banner');
      var action = document.getElementById('pwa-install-action');
      var close = document.getElementById('pwa-install-close');
      var detail = document.getElementById('pwa-install-detail');
      var deferredPrompt = null;
      var dismissed = false;

      function isStandalone() {
        return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      }

      function isiOS() {
        return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
      }

      function showBanner() {
        if (dismissed || isStandalone()) {
          return;
        }
        banner.hidden = false;
        banner.classList.add('is-visible');
        if (!deferredPrompt && isiOS()) {
          action.textContent = 'How';
          detail.textContent = 'On iPhone: Share, then Add to Home Screen.';
        } else if (!deferredPrompt) {
          action.textContent = 'Open';
          detail.textContent = 'Use your browser menu, then choose Install app or Add to home screen.';
        }
      }

      function hideBanner() {
        banner.classList.remove('is-visible');
        banner.hidden = true;
      }

      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        deferredPrompt = event;
        action.textContent = 'Install';
        detail.textContent = 'Open Nurse Singles like an app from your home screen.';
        showBanner();
      });

      window.addEventListener('appinstalled', function () {
        dismissed = true;
        deferredPrompt = null;
        hideBanner();
      });

      action.addEventListener('click', function () {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.finally(function () {
            deferredPrompt = null;
          });
          return;
        }
        showBanner();
      });

      close.addEventListener('click', function () {
        dismissed = true;
        hideBanner();
      });

      window.setTimeout(showBanner, 1500);
    })();
  </script>
  <!-- scripts/build_web.ps1 rewrites this to a unique startup bundle for each Firebase Hosting release. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
