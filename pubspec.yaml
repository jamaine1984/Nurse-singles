name: nightingale_heart
description: "Nurse Singles - Premium dating for healthcare workers worldwide"
publish_to: 'none'
version: 1.0.1+4

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.2.0+3
  flutter_card_swiper: ^7.0.1
  qr_flutter: ^4.1.0

  # Utilities
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  geolocator: ^14.0.0
  geocoding: ^3.0.0
  timeago: ^3.7.0
  flutter_dotenv: ^5.2.1
  path_provider: ^2.1.5

  # Video Calling (ZegoCloud)
  zego_uikit_prebuilt_call: ^4.18.3
  zego_uikit: ^2.28.44

  # Payments (RevenueCat)
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1

  # Ads (AdMob)
  google_mobile_ads: 6.0.0

  # Other
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.15.0
  emoji_picker_flutter: ^4.3.0

  # Voice Recording & Audio Playback
  record: ^6.0.0
  audioplayers: ^6.1.0
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  firebase_app_check: ^0.3.2+10
  cloud_functions: ^5.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/welcome/
